<h1 id="carbon-for-marp">Carbon <strong>for Marp</strong></h1>
<h2 id="a-marp-theme-based-on-the-ibm-carbon-design-system">A Marp theme based on the IBM Carbon Design System</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-footer="Carbon for Marp" data-theme="carbon" lang="en-US" data-marpit-pagination="2" style="--paginate:true;--footer:Carbon for Marp;--theme:carbon;" data-marpit-pagination-total="12">
<h6 id="section-01">Section 01</h6>
<h1 id="whats-in-the-box">What's in the box</h1>
<ul>
<li>Carbon color tokens (white, g10, g90, g100)</li>
<li>IBM Plex Sans, Serif, and Mono</li>
<li>Light and dark variants</li>
<li>Per-slide tonal overrides via <code>class:</code></li>
<li>CSS variable overrides for any color or font</li>
</ul>
<footer>Carbon for Marp</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-footer="Carbon for Marp" data-theme="carbon" lang="en-US" data-marpit-pagination="3" style="--paginate:true;--footer:Carbon for Marp;--theme:carbon;" data-marpit-pagination-total="12">
<h2 id="typography">Typography</h2>
<p>Headings use IBM Plex Sans Light (300) at large sizes and Regular (400) for body. Inline <code>code</code> and code blocks use IBM Plex Mono.</p>
<blockquote>
<p>Good design is good business.<br />
Thomas J. Watson Jr.</p>
</blockquote>
<footer>Carbon for Marp</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-footer="Carbon for Marp" data-class="split" data-theme="carbon" lang="en-US" class="split" data-marpit-pagination="4" style="--paginate:true;--footer:Carbon for Marp;--class:split;--theme:carbon;" data-marpit-pagination-total="12">
<h2 id="two-columns">Two columns</h2>
<p>Use <code>&lt;!-- _class: split --&gt;</code> to put the slide into a two-column grid. Headings span both columns.</p>
<ul>
<li>Carbon spacing scale</li>
<li>64px slide padding</li>
<li>4px accent rule on every slide</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">carbon</span>(<span class="hljs-params">theme=<span class="hljs-string">&quot;white&quot;</span></span>):
    tokens = load(theme)
    <span class="hljs-keyword">return</span> apply(tokens)

<span class="hljs-built_in">print</span>(carbon(<span class="hljs-string">&quot;g100&quot;</span>))
</code></pre>
<footer>Carbon for Marp</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-footer="Carbon for Marp" data-class="dark" data-theme="carbon" lang="en-US" class="dark" data-marpit-pagination="5" style="--paginate:true;--footer:Carbon for Marp;--class:dark;--theme:carbon;" data-marpit-pagination-total="12">
<h2 id="dark-mode-g100">Dark mode (g100)</h2>
<p>Set <code>&lt;!-- _class: dark --&gt;</code> on a slide, or use the <code>carbon-dark</code> theme for a dark deck by default. Tokens flip to the Carbon g100 palette.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-ts"><span class="hljs-keyword">type</span> <span class="hljs-title class_">Theme</span> = <span class="hljs-string">&#x27;white&#x27;</span> | <span class="hljs-string">&#x27;g10&#x27;</span> | <span class="hljs-string">&#x27;g90&#x27;</span> | <span class="hljs-string">&#x27;g100&#x27;</span>;

<span class="hljs-keyword">const</span> <span class="hljs-attr">tokens</span>: <span class="hljs-title class_">Record</span>&lt;<span class="hljs-title class_">Theme</span>, <span class="hljs-title class_">Token</span>[]&gt; = <span class="hljs-title function_">load</span>();
</code></pre>
<footer>Carbon for Marp</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-footer="Carbon for Marp" data-class="g10" data-theme="carbon" lang="en-US" class="g10" data-marpit-pagination="6" style="--paginate:true;--footer:Carbon for Marp;--class:g10;--theme:carbon;" data-marpit-pagination-total="12">
<h2 id="tonal-layers">Tonal layers</h2>
<p><code>g10</code> is the light tonal layer: gray-10 background, white layers. Pair with <code>g90</code> on dark decks.</p>
<table>
<thead>
<tr>
<th>Theme</th>
<th>Background</th>
<th>Text</th>
</tr>
</thead>
<tbody>
<tr>
<td>white</td>
<td><code>#ffffff</code></td>
<td>gray-100</td>
</tr>
<tr>
<td>g10</td>
<td><code>#f4f4f4</code></td>
<td>gray-100</td>
</tr>
<tr>
<td>g90</td>
<td><code>#262626</code></td>
<td>gray-10</td>
</tr>
<tr>
<td>g100</td>
<td><code>#161616</code></td>
<td>gray-10</td>
</tr>
</tbody>
</table>
<footer>Carbon for Marp</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-footer="Carbon for Marp" data-theme="carbon" lang="en-US" data-marpit-pagination="7" style="--paginate:true;--footer:Carbon for Marp;--theme:carbon;" data-marpit-pagination-total="12">
<h2 id="customizing">Customizing</h2>
<p>Override Carbon tokens via the <code>style:</code> directive:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-meta">---</span>
<span class="hljs-attr">marp:</span> <span class="hljs-literal">true</span>
<span class="hljs-attr">theme:</span> <span class="hljs-string">carbon</span>
<span class="hljs-attr">style:</span> <span class="hljs-string">|
  section {
    --carbon-accent: #8a3ffc;
    --carbon-bg: #f4f4f4;
  }
</span><span class="hljs-meta">---
</span></code></pre>
<footer>Carbon for Marp</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-footer="Carbon for Marp" data-theme="carbon" lang="en-US" data-marpit-pagination="8" style="--paginate:true;--footer:Carbon for Marp;--theme:carbon;" data-marpit-pagination-total="12">
<h2 id="nested-lists-and-math">Nested lists and math</h2>
<ol>
<li>Carbon ships four themes
<ul>
<li><code>white</code> and <code>g10</code> are light</li>
<li><code>g90</code> and <code>g100</code> are dark</li>
</ul>
</li>
<li>Each theme is a set of design tokens</li>

  D --> E[(Database)]
